<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=2560, initial-scale=1">
  <title>ON ÉCOUTE — Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="on-ecoute.css?v=10">
</head>
<body>

  <!-- ===== TOP BAR: judges left + player center + judges right ===== -->
  <div class="top-bar" id="topBar">

    <!-- Host judge buttons (left) -->
    <div class="judge-side">
      <div class="judge-name" id="hostName"></div>
      <div class="judge-panel host-panel">
        <button class="judge-btn" data-judge="host" data-vote="fire">
          <div class="judge-btn-inner"><span class="judge-emoji">&#x1F525;</span></div>
          <span class="judge-btn-label">FIRE</span>
        </button>
        <button class="judge-btn" data-judge="host" data-vote="up">
          <div class="judge-btn-inner"><span class="judge-emoji">&#x1F44D;</span></div>
          <span class="judge-btn-label">J'AIME BIEN</span>
        </button>
        <button class="judge-btn" data-judge="host" data-vote="down">
          <div class="judge-btn-inner"><span class="judge-emoji">&#x1F44E;</span></div>
          <span class="judge-btn-label">PAS FAN</span>
        </button>
      </div>
    </div>

    <!-- Player bar (center capsule) -->
    <div class="player-bar" id="playerBar">
      <button class="play-btn" id="playBtn">
        <span id="playIcon" class="play-icon">&#x25B6;</span>
        <span id="pauseIcon" class="play-icon" style="display:none">&#x23F8;</span>
      </button>
      <div class="waveform-wrap">
        <canvas id="waveformCanvas"></canvas>
      </div>
    </div>

    <!-- Guest judge buttons (right) -->
    <div class="judge-side">
      <div class="judge-name" id="guestName"></div>
      <div class="judge-panel guest-panel">
        <button class="judge-btn" data-judge="guest" data-vote="fire">
          <div class="judge-btn-inner"><span class="judge-emoji">&#x1F525;</span></div>
          <span class="judge-btn-label">FIRE</span>
        </button>
        <button class="judge-btn" data-judge="guest" data-vote="up">
          <div class="judge-btn-inner"><span class="judge-emoji">&#x1F44D;</span></div>
          <span class="judge-btn-label">J'AIME BIEN</span>
        </button>
        <button class="judge-btn" data-judge="guest" data-vote="down">
          <div class="judge-btn-inner"><span class="judge-emoji">&#x1F44E;</span></div>
          <span class="judge-btn-label">PAS FAN</span>
        </button>
      </div>
    </div>

  </div>

  <!-- Reaction rain zones (full height columns) -->
  <div class="reaction-zone host-reactions" id="hostReaction"></div>
  <div class="reaction-zone guest-reactions" id="guestReaction"></div>

  <!-- Track info box (large, below player bar) -->
  <div class="track-info-box" id="trackInfoBox">
    <div class="track-title" id="trackTitle">En attente...</div>
    <div class="track-details">
      <span class="track-artist" id="trackArtist"></span>
      <span class="track-sep" id="trackSep"></span>
      <span class="track-submitter" id="trackSubmitter"></span>
    </div>
    <div class="track-time-row">
      <div class="progress-bar-inline" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="track-time">
        <span id="currentTime">0:00</span>
        <span class="time-slash">/</span>
        <span id="totalTime">0:00</span>
      </span>
    </div>
  </div>

  <!-- Hidden nav (keyboard controlled) -->
  <div style="display:none">
    <button id="prevBtn"></button>
    <button id="nextBtn"></button>
    <span id="queueCounter"></span>
  </div>

  <!-- Bottom cards container (right side) -->
  <div class="bottom-cards-row">
    <!-- Meilleur Son card -->
    <div class="legend-card" id="legendCard">
      <div class="legend-badge">MEILLEUR SON</div>
      <div class="legend-user" id="legendUser">&mdash;</div>
      <div class="legend-track" id="legendTrack"></div>
      <div class="legend-fire" id="legendFire">&#128293; 0</div>
    </div>

    <!-- L'avis du chat -->
    <div class="oe-chat-card" id="oeChatCard">
      <div class="oe-chat-title">L'AVIS DU CHAT</div>
      <div class="oe-chat-row c-fire">
        <span class="oe-chat-label">&#128293;</span>
        <span class="oe-chat-pct" id="oeChatPct1">0%</span>
        <div class="oe-chat-bar-bg"><div class="oe-chat-bar-fill" id="oeChatBar1" style="width:0%"></div></div>
        <span class="oe-chat-count" id="oeChatCount1">(0)</span>
      </div>
      <div class="oe-chat-row c-up">
        <span class="oe-chat-label">&#128077;</span>
        <span class="oe-chat-pct" id="oeChatPct2">0%</span>
        <div class="oe-chat-bar-bg"><div class="oe-chat-bar-fill" id="oeChatBar2" style="width:0%"></div></div>
        <span class="oe-chat-count" id="oeChatCount2">(0)</span>
      </div>
      <div class="oe-chat-row c-down">
        <span class="oe-chat-label">&#128078;</span>
        <span class="oe-chat-pct" id="oeChatPct3">0%</span>
        <div class="oe-chat-bar-bg"><div class="oe-chat-bar-fill" id="oeChatBar3" style="width:0%"></div></div>
        <span class="oe-chat-count" id="oeChatCount3">(0)</span>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
  </div>

  <script src="on-ecoute.js?v=10"></script>
</body>
</html>
