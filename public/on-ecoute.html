<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=2560, initial-scale=1">
  <title>ON ÉCOUTE — Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="on-ecoute.css?v=5">
</head>
<body>

  <!-- ===== TOP BAR: judges left + player center + judges right ===== -->
  <div class="top-bar" id="topBar">

    <!-- Host judge buttons (left) -->
    <div class="judge-panel host-panel">
      <button class="judge-btn" data-judge="host" data-vote="fire">
        <div class="judge-btn-inner">
          <img src="fire.png" alt="Fire">
        </div>
        <span class="judge-btn-label">FIRE</span>
      </button>
      <button class="judge-btn" data-judge="host" data-vote="down">
        <div class="judge-btn-inner">
          <img src="pouce-rouge.png" alt="Thumbs Down">
        </div>
        <span class="judge-btn-label">THUMBS DOWN</span>
      </button>
      <button class="judge-btn" data-judge="host" data-vote="up">
        <div class="judge-btn-inner">
          <img src="pouce-vert.png" alt="Thumbs Up">
        </div>
        <span class="judge-btn-label">THUMBS UP</span>
      </button>
    </div>

    <!-- Player bar (center capsule) -->
    <div class="player-bar" id="playerBar">
      <button class="play-btn" id="playBtn">
        <img id="playImg" src="play.png" alt="Play">
        <img id="pauseImg" src="pause.png" alt="Pause" style="display:none">
      </button>
      <div class="waveform-wrap">
        <canvas id="waveformCanvas"></canvas>
      </div>
    </div>

    <!-- Guest judge buttons (right) -->
    <div class="judge-panel guest-panel">
      <button class="judge-btn" data-judge="guest" data-vote="fire">
        <div class="judge-btn-inner">
          <img src="fire.png" alt="Fire">
        </div>
        <span class="judge-btn-label">FIRE</span>
      </button>
      <button class="judge-btn" data-judge="guest" data-vote="down">
        <div class="judge-btn-inner">
          <img src="pouce-rouge.png" alt="Thumbs Down">
        </div>
        <span class="judge-btn-label">THUMBS DOWN</span>
      </button>
      <button class="judge-btn" data-judge="guest" data-vote="up">
        <div class="judge-btn-inner">
          <img src="pouce-vert.png" alt="Thumbs Up">
        </div>
        <span class="judge-btn-label">THUMBS UP</span>
      </button>
    </div>

  </div>

  <!-- Reaction containers -->
  <div class="reaction-zone host-reactions" id="hostReaction"></div>
  <div class="reaction-zone guest-reactions" id="guestReaction"></div>

  <!-- Track info (subtle, below player bar) -->
  <div class="track-info-bar">
    <span class="track-title" id="trackTitle">En attente...</span>
    <span class="track-artist" id="trackArtist"></span>
    <span class="track-sep" id="trackSep"></span>
    <span class="track-submitter" id="trackSubmitter"></span>
    <span class="track-time">
      <span id="currentTime">0:00</span>
      <span class="time-slash">/</span>
      <span id="totalTime">0:00</span>
    </span>
  </div>

  <!-- Progress bar (thin, below top bar) -->
  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- Hidden nav for source/queue (invisible, controlled by keyboard) -->
  <div style="display:none">
    <button id="prevBtn"></button>
    <button id="nextBtn"></button>
    <button id="srcAll"></button>
    <button id="srcUpload"></button>
    <button id="srcYoutube"></button>
    <span id="queueCounter"></span>
  </div>

  <!-- Meilleur Son card -->
  <div class="legend-card" id="legendCard">
    <div class="legend-badge">MEILLEUR SON</div>
    <div class="legend-user" id="legendUser">—</div>
    <div class="legend-track" id="legendTrack"></div>
    <div class="legend-fire" id="legendFire">🔥 0</div>
  </div>

  <!-- Loading -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
  </div>

  <!-- Hidden YouTube player -->
  <div id="ytPlayerWrap" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden;">
    <div id="ytPlayer"></div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="on-ecoute.js?v=5"></script>
</body>
</html>
