<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEAT PLAYER</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Background layers -->
  <div class="bg"></div>
  <div class="bg-dim"></div>
  <div class="bg-grain"></div>
  <div class="vig"></div>
  <div class="grain"></div>
  <div class="grain2"></div>

  <!-- Fire overlay -->
  <div class="fire-overlay" id="fireOverlay">
    <div class="fire-overlay-glow"></div>
    <div class="fire-overlay-bottom" id="flameBottom"></div>
    <div class="fire-overlay-top" id="flameTop"></div>
    <div class="fire-overlay-embers" id="emberContainer"></div>
  </div>

  <!-- Fire particle canvas (GPU accelerated) -->
  <canvas id="fireParticleCanvas" style="position:fixed;inset:0;z-index:910;pointer-events:none;"></canvas>

  <!-- Combo display -->
  <div id="fireCombo" class="fire-combo">
    <span class="fire-combo-x">x</span><span class="fire-combo-num" id="fireComboNum">1</span>
    <span class="fire-combo-label">COMBO</span>
  </div>

  <!-- Shockwave ring -->
  <div id="fireShockwave" class="fire-shockwave"></div>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <span class="loading-text">CHARGEMENT...</span>
  </div>

  <!-- Main wrapper -->
  <div class="wrapper" id="wrapper">

    <!-- Hidden file input (fallback) -->
    <input type="file" id="audioFileInput" accept="audio/*" multiple aria-label="Charger un fichier audio" style="display:none;">

    <div class="scene" id="scene">
      <!-- Hammer meter (above waveform) -->
      <div class="hammer-card" id="hammerMeter">
        <div class="hammer-gauge-wrap">
          <svg class="hammer-gauge" viewBox="0 0 120 120">
            <circle class="gauge-track" cx="60" cy="60" r="52" />
            <circle class="gauge-fill" id="gaugeFill" cx="60" cy="60" r="52" />
            <circle class="gauge-glow" id="gaugeGlow" cx="60" cy="60" r="52" />
          </svg>
          <div class="hammer-icon-wrap" id="hammerIconWrap">
            <img src="marteau.png" alt="Marteau" class="hammer-icon" id="hammerIcon">
          </div>
          <div class="hammer-shockwave" id="hammerShockwave"></div>
        </div>
        <div class="hammer-info">
          <div class="hammer-pct-line">
            <span class="hammer-label">PUISSANCE</span>
            <span class="hammer-pct" id="hammerPct">0%</span>
          </div>
          <div class="hammer-stage" id="hammerStage"></div>
        </div>
      </div>

      <!-- Waveform panel -->
      <div class="waveform-panel glass-panel">
        <div class="glass-specular"></div>
        <div class="glass-edge"></div>
        <div class="glass-iridescent"></div>
        <div class="refl"></div>
        <div class="refl2"></div>
        <div class="refl3"></div>
        <div class="waveform-inner">
          <div class="waveform-glow"></div>
          <div class="waveform-glow2"></div>

          <canvas id="waveformCanvas"></canvas>
          <span class="time-overlay left" id="currentTime">0:00</span>
          <span class="time-overlay right" id="totalTime">0:00</span>
          <div class="volume-wrap">
            <span class="volume-icon" id="volumeIcon" role="button" tabindex="0" aria-label="Volume">&#128266;</span>
            <input type="range" class="volume-slider" id="volumeSlider"
                   min="0" max="1" step="0.01" value="1"
                   aria-label="Controle du volume">
          </div>

          <!-- Transport controls (inside waveform panel) -->
          <div class="transport-controls">
            <div class="transport-left">
              <div class="source-toggle">
                <button class="source-btn active" id="srcUpload" data-type="upload">UPLOADS</button>
                <button class="source-btn" id="srcYoutube" data-type="youtube">YOUTUBE</button>
              </div>
              <div class="queue-counter" id="queueCounter">0/0</div>
              <button class="wipe-btn" id="wipeBtn" title="Supprimer tous les uploads">WIPE ALL</button>
            </div>
            <div class="transport-center">
              <button class="transport-btn" id="prevBtn" aria-label="Son précédent">
                <svg viewBox="0 0 24 24" fill="white" width="28" height="28"><path d="M6 6h2v12H6zm12 0l-9 6 9 6V6z"/></svg>
              </button>
              <button class="play-btn" id="playBtn" aria-label="Lecture / Pause">
                <img src="play.png" alt="Play" class="play-img" id="playImg">
                <img src="pause.png" alt="Pause" class="pause-img" id="pauseImg" style="display:none;">
              </button>
              <button class="transport-btn" id="nextBtn" aria-label="Son suivant">
                <svg viewBox="0 0 24 24" fill="white" width="28" height="28"><path d="M6 6l9 6-9 6V6zm10 0h2v12h-2V6z"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Mini waveform navigation -->
      <div class="mini-nav" id="miniNav" role="slider" aria-label="Navigation dans le morceau">
        <canvas id="miniCanvas"></canvas>
        <div class="mini-progress" id="miniProgress"></div>
      </div>

      <!-- Track info card (top-left) -->
      <div class="user-card" id="trackInfoCard">
        <div class="user-avatar">&#127925;</div>
        <div class="track-info-text">
          <div class="user-name" id="trackTitle">En attente...</div>
          <div class="user-elo" id="trackArtist"></div>
          <div class="track-proposed" id="trackSubmitter"></div>
        </div>
      </div>

      <!-- L'avis du chat (top-right) -->
      <div class="chat-card">
        <div class="chat-title">L'AVIS DU CHAT</div>
        <div class="chat-row c-fire">
          <span class="chat-label">&#128293;</span>
          <span class="chat-pct" id="chatPct1">56%</span>
          <div class="chat-bar-bg"><div class="chat-bar-fill" id="chatBar1" style="width:56%"></div></div>
          <span class="chat-count" id="chatCount1">(430)</span>
        </div>
        <div class="chat-row c-up">
          <span class="chat-label">&#128077;</span>
          <span class="chat-pct" id="chatPct2">30%</span>
          <div class="chat-bar-bg"><div class="chat-bar-fill" id="chatBar2" style="width:30%"></div></div>
          <span class="chat-count" id="chatCount2">(96)</span>
        </div>
        <div class="chat-row c-down">
          <span class="chat-label">&#128078;</span>
          <span class="chat-pct" id="chatPct3">14%</span>
          <div class="chat-bar-bg"><div class="chat-bar-fill" id="chatBar3" style="width:14%"></div></div>
          <span class="chat-count" id="chatCount3">(111)</span>
        </div>
      </div>

      <!-- Meilleur Son -->
      <div class="legend-card" id="legendCard">
        <div class="legend-title">MEILLEUR SON</div>
        <div class="legend-user" id="legendUser">En attente...</div>
        <div class="legend-track" id="legendTrack">Le track avec le plus de &#128293; appara&icirc;tra ici</div>
        <div class="legend-fire" id="legendFire"></div>
      </div>

      <!-- Vote bar: pouce rouge | FIRE | pouce vert -->
      <div class="vote-bar">
        <button class="vote-btn vote-btn-red" id="btnDown" aria-label="Je n'aime pas"><img src="pouce-rouge.png" alt="Pouce rouge" class="vote-icon"></button>
        <div class="fire-wrap">
          <button class="fire-btn" id="btnFire" aria-label="FIRE! Vote coup de coeur">
            <img src="fire.png" alt="FIRE" class="fire-img">
          </button>
        </div>
        <button class="vote-btn vote-btn-green" id="btnUp" aria-label="J'aime"><img src="pouce-vert.png" alt="Pouce vert" class="vote-icon"></button>
      </div>
    </div>
  </div>

  <!-- Hidden YouTube player -->
  <div id="ytPlayerWrap" style="position:absolute;top:-9999px;left:-9999px;width:320px;height:180px;pointer-events:none;">
    <div id="ytPlayer"></div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="app.js"></script>
</body>
</html>
