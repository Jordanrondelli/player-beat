<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEAT PLAYER — Connexion</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    html, body { overflow: auto; }
    .login-page {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .login-card {
      width: 100%; max-width: 400px;
      padding: 48px 40px;
      border-radius: 24px;
      background: linear-gradient(165deg, rgba(30,45,90,.45) 0%, rgba(12,20,55,.6) 40%, rgba(8,14,40,.65) 100%);
      backdrop-filter: blur(40px) saturate(1.3);
      -webkit-backdrop-filter: blur(40px) saturate(1.3);
      border: 1px solid rgba(255,255,255,.1);
      border-top-color: rgba(255,255,255,.18);
      box-shadow: 0 20px 60px rgba(0,0,0,.4), 0 0 40px rgba(100,140,255,.05);
    }
    .login-title {
      font-family: 'Bangers', cursive;
      font-size: 32px; letter-spacing: 3px;
      text-align: center;
      background: linear-gradient(135deg, #fff 0%, #a8c0ff 50%, #ff6040 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .login-sub {
      text-align: center; font-size: 13px;
      color: rgba(255,255,255,.4);
      margin-bottom: 36px;
      font-weight: 500;
    }
    .login-input {
      width: 100%; padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: #fff; font-family: 'Quicksand', sans-serif;
      font-size: 15px; font-weight: 600;
      outline: none; transition: all .25s;
    }
    .login-input:focus {
      border-color: rgba(255,120,60,.5);
      background: rgba(255,255,255,.1);
      box-shadow: 0 0 20px rgba(255,80,30,.15);
    }
    .login-input::placeholder { color: rgba(255,255,255,.3); }
    .login-btn {
      width: 100%; padding: 14px;
      margin-top: 20px;
      border-radius: 14px; border: none;
      background: linear-gradient(135deg, #ff6030, #ff4010);
      color: #fff; font-family: 'Bangers', cursive;
      font-size: 18px; letter-spacing: 2px;
      cursor: pointer; transition: all .25s;
      box-shadow: 0 4px 20px rgba(255,60,20,.3);
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255,60,20,.5);
    }
    .login-btn:active { transform: translateY(1px); }
    .login-error {
      margin-top: 16px; padding: 10px 14px;
      border-radius: 10px;
      background: rgba(255,40,40,.15);
      border: 1px solid rgba(255,40,40,.3);
      color: #ff6060; font-size: 13px; font-weight: 600;
      text-align: center;
      display: none;
    }
    .login-error.show { display: block; }
    .login-icon {
      text-align: center; font-size: 48px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="bg-dim"></div>
  <div class="bg-grain"></div>
  <div class="vig"></div>

  <div class="login-page">
    <div class="login-card">
      <div class="login-icon">&#128296;</div>
      <div class="login-title">BEAT PLAYER</div>
      <div class="login-sub">Espace admin</div>
      <form id="loginForm">
        <input type="password" class="login-input" id="passwordInput"
               placeholder="Mot de passe..." autocomplete="current-password">
        <button type="submit" class="login-btn">ENTRER</button>
        <div class="login-error" id="loginError"></div>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('passwordInput').value;
      const errEl = document.getElementById('loginError');
      errEl.classList.remove('show');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/player';
        } else {
          errEl.textContent = data.error || 'Mot de passe incorrect';
          errEl.classList.add('show');
        }
      } catch {
        errEl.textContent = 'Erreur de connexion';
        errEl.classList.add('show');
      }
    });
  </script>
</body>
</html>
